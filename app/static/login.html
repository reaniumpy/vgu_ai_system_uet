<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign in · cortis</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark" aria-hidden="true">🛡️</span>
      <div>
        <div class="brand-name">cortis</div>
        <div class="brand-sub">Document Safety Check</div>
      </div>
    </div>
  </header>

  <main class="login-wrap">
    <div class="card login-card">
      <h1 class="card-title">Sign in</h1>
      <p class="login-lead">Choose your account to open your team's workspace.</p>
      <ul id="account-list" class="account-list" aria-busy="true">
        <li class="account-loading">Loading accounts…</li>
      </ul>
      <p class="login-note">Demo sign-in — no password required. Single sign-on is a
        production follow-up.</p>
    </div>
  </main>

  <footer class="footer">cortis · a prompt-injection guard for non-technical teams</footer>
  <script src="/static/login.js"></script>
</body>
</html>
