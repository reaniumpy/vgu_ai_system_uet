<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Workspace · cortis</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark" aria-hidden="true">🛡️</span>
      <div>
        <div class="brand-name">cortis</div>
        <div class="brand-sub" data-i18n="brand.sub">Document Safety Check</div>
      </div>
    </div>
    <nav class="topnav">
      <span id="identity" class="identity"></span>
      <button id="help-btn" class="link-btn" type="button" data-i18n="nav.help">Help</button>
      <button id="lang-toggle" class="link-btn" type="button">Tiếng Việt</button>
      <button id="signout" class="link-btn" type="button" data-i18n="nav.signout">Sign out</button>
    </nav>
  </header>

  <main class="wrap wrap-wide">
    <div id="onboard" class="onboard" hidden>
      <div class="onboard-body">
        <strong data-i18n="onboard.title">Welcome to cortis</strong>
        <span data-i18n="onboard.body">Pick a document to begin. cortis checks it for hidden
          instructions, and only safe documents are sent to the AI assistant.</span>
      </div>
      <button id="onboard-dismiss" class="secondary-btn" type="button" data-i18n="onboard.dismiss">Got it</button>
    </div>

    <div class="ws-header">
      <h1 id="ws-title" class="ws-title"></h1>
      <p id="ws-blurb" class="ws-blurb"></p>
    </div>

    <section id="docs" class="docs" aria-live="polite">
      <p class="loading-line" data-i18n="ws.loading">Loading your documents…</p>
    </section>
  </main>

  <!-- Hidden file inputs (real uploads) -->
  <input id="jd-input" type="file" accept=".pdf,.docx,.txt" hidden />
  <input id="docs-input" type="file" accept=".pdf,.docx,.txt" multiple hidden />

  <footer class="footer">cortis · every action is screened before it reaches the AI assistant</footer>

  <!-- Help modal -->
  <div id="help-modal" class="modal-overlay" hidden>
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="help-title">
      <div class="modal-head">
        <span id="help-title" data-i18n="help.title">How this works</span>
        <button id="help-close" class="chip-x" type="button" aria-label="Close">✕</button>
      </div>
      <div class="modal-body">
        <p id="help-general" class="help-text"></p>
        <p id="help-team" class="help-text"></p>
      </div>
    </div>
  </div>

  <div id="toasts" class="toasts" aria-live="polite" aria-atomic="false"></div>

  <script src="/static/i18n.js"></script>
  <script src="/static/workspace.js"></script>
</body>
</html>
